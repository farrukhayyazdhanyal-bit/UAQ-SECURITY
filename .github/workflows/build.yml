name: Build Mobile Offline APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Native Android Project Structure
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/uaq/securityapp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # Copy your local tracking HTML directly into the App
          cp index.html app/src/main/assets/index.html

      - name: Generate Android Manifest and Configs
        run: |
          # Create AndroidManifest.xml with Storage, Camera, and Flashlight rights
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.uaq.securityapp">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.FLASHLIGHT" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              
              <uses-feature android:name="android.hardware.camera" android:required="false" />
              <uses-feature android:name="android.hardware.camera.flash" android:required="false" />
              
              <application android:label="UAQ Security" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="android.core.content.FileProvider"
                      android:authorities="com.uaq.securityapp.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF

          # Create system file paths for cleanly passing images taken on camera
          mkdir -p app/src/main/res/xml
          cat << 'EOF' > app/src/main/res/xml/file_paths.xml
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external_files" path="." />
          </paths>
          EOF

          # Create MainActivity.java using standard native tools
          cat << 'EOF' > app/src/main/java/com/uaq/securityapp/MainActivity.java
          package com.uaq.securityapp;
          
          import android.app.Activity;
          import android.app.DownloadManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.hardware.camera2.CameraManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.MediaStore;
          import android.webkit.CookieManager;
          import android.webkit.DownloadListener;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Toast;
          import java.io.File;
          import java.io.IOException;
