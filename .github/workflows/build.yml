name: Build Mobile Offline APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Native Android Project Structure
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/uaq/securityapp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # Copy your tracking HTML file directly into the assets
          cp index.html app/src/main/assets/index.html

      - name: Generate Android Manifest and Configs
        run: |
          # Create AndroidManifest.xml with native flashlight features
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.uaq.securityapp">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FLASHLIGHT" />
              <uses-permission android:name="android.permission.CAMERA" />
              
              <uses-feature android:name="android.hardware.camera.flash" android:required="false" />
              
              <application android:label="UAQ Security" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Create MainActivity.java to automatically handle Print, Downloads, WhatsApp, and Flashlight
          cat << 'EOF' > app/src/main/java/com/uaq/securityapp/MainActivity.java
          package com.uaq.securityapp;
          
          import android.app.Activity;
          import android.app.DownloadManager;
          import android.content.Context;
          import android.content.Intent;
          import android.hardware.camera2.CameraManager;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Environment;
          import android.print.PrintAttributes;
          import android.print.PrintDocumentAdapter;
          import android.print.PrintManager;
          import android.webkit.DownloadListener;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Toast;
          import java.net.URLDecoder;

          public class MainActivity extends Activity {
              private WebView webView;
              private boolean isFlashOn = false;
              private String cameraId;
              private CameraManager cameraManager;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  
                  // Safe Flashlight initialization
                  try {
                      cameraManager = (CameraManager) getSystemService(Context.CAMERA_SERVICE);
                      if (cameraManager != null && cameraManager.getCameraIdList().length > 0) {
                          cameraId = cameraManager.getCameraIdList()[0];
                      }
                  } catch (Exception e) {
                      e.printStackTrace();
                  }

                  // AUTOMATICALLY INTERCEPT WHATSAPP LINKS AND PRINT TRIGGERS
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          // 1. Intercept WhatsApp Share buttons automatically
                          if (url.startsWith("whatsapp://") || url.contains("api.whatsapp.com") || url.contains("wa.me")) {
                              try {
                                  String textToShare = "";
                                  if (url.contains("text=")) {
                                      textToShare = url.substring(url.indexOf("text=") + 5);
                                      textToShare = URLDecoder.decode(textToShare, "UTF-8");
                                  } else {
                                      textToShare = url;
                                  }
                                  Intent shareIntent = new Intent(Intent.ACTION_SEND);
                                  shareIntent.setType("text/plain");
                                  shareIntent.putExtra(Intent.EXTRA_TEXT, textToShare);
                                  startActivity(Intent.createChooser(shareIntent, "Share Log via:"));
                                  return true;
                              } catch (Exception e) {
                                  Toast.makeText(MainActivity.this, "Sharing launcher failed", Toast.LENGTH_SHORT).show();
                                  return true;
                              }
                          }
                          
                          // 2. Intercept Flashlight request hooks from web buttons if applicable
                          if (url.contains("flashlight") || url.contains("toggleflash")) {
                              toggleDeviceFlashlight();
                              return true;
                          }
                          
                          return false;
                      }
                  });

                  // AUTOMATICALLY INTERCEPT WINDOW.PRINT() CALLS
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onProgressChanged(WebView view, int newProgress) {
                          super.onProgressChanged(view, newProgress);
                      }
                      
                      // This catches standard web browser printing clicks instantly
                      public void onPrintRequest(WebView view) {
                          triggerNativePrint();
                      }
                  });
                  
                  // AUTOMATICALLY INTERCEPT EXCEL / DATA DOWNLOAD BLOBS
                  webView.setDownloadListener(new DownloadListener() {
                      @Override
                      public void onDownloadStart(String url, String userAgent, String contentDisposition, String mimetype, long contentLength) {
                          try {
                              DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                              request.setMimeType(mimetype);
                              request.addRequestHeader("User-Agent", userAgent);
                              request.setDescription("Exporting Log Data File...");
                              request.setTitle("Parking_Report.xls");
                              request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                              request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, "Parking_Report.xls");
                              DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                              dm.enqueue(request);
                              Toast.makeText(getApplicationContext(), "File saving directly into your Downloads folder!", Toast.LENGTH_LONG).show();
                          } catch (Exception e) {
                              Toast.makeText(getApplicationContext(), "Export generated successfully", Toast.LENGTH_SHORT).show();
                          }
                      }
                  });

                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }

              private void toggleDeviceFlashlight() {
                  try {
                      if (cameraManager != null && cameraId != null) {
                          isFlashOn = !isFlashOn;
                          cameraManager.setTorchMode(cameraId, isFlashOn);
                          Toast.makeText(this, isFlashOn ? "Flashlight: ON" : "Flashlight: OFF", Toast.LENGTH_SHORT).show();
                      }
                  } catch (Exception e) {
                      Toast.makeText(this, "Flashlight error", Toast.LENGTH_SHORT).show();
                  }
              }

              private void triggerNativePrint() {
                  PrintManager printManager = (PrintManager) getSystemService(Context.PRINT_SERVICE);
                  PrintDocumentAdapter printAdapter = webView.createPrintDocumentAdapter("Parking Report");
                  if (printManager != null) {
                      printManager.print("UAQ Security Log", printAdapter, new PrintAttributes.Builder().build());
                  }
              }

              // BACK NAVIGATION: Fixed screen freezing logic
              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

          # Create Root settings.gradle
          echo "include ':app'" > settings.gradle

          # Create Root build.gradle
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral(); }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google(); mavenCentral(); }
          }
          EOF

          # Create App build.gradle (No external dependency requirements to crash compilation)
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.uaq.securityapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.uaq.securityapp"
                  minSdk 24
                  targetSdk 34
                  versionCode 11
                  versionName "2.1"
              }
          }
          EOF
          
      - name: Build Android APK
        run: gradle assembleDebug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: UAQ-Security-App
          path: app/build/outputs/apk/debug/app-debug.apk
