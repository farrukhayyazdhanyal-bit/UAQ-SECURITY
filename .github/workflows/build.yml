name: Build Mobile Offline APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Native Android Project Structure
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/uaq/securityapp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # Copy your tracking HTML file directly into the assets
          cp index.html app/src/main/assets/index.html

      - name: Generate Android Manifest and Configs
        run: |
          # Create AndroidManifest.xml with the correct core FileProvider path
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.uaq.securityapp">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.FLASHLIGHT" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              
              <uses-feature android:name="android.hardware.camera" android:required="false" />
              <uses-feature android:name="android.hardware.camera.flash" android:required="false" />
              
              <application android:label="UAQ Security" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.uaq.securityapp.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF

          # Create system file paths for cleanly passing images taken on camera
          mkdir -p app/src/main/res/xml
          cat << 'EOF' > app/src/main/res/xml/file_paths.xml
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external_files" path="." />
          </paths>
          EOF

          # Create MainActivity.java with native camera, flash, and storage pipelines
          cat << 'EOF' > app/src/main/java/com/uaq/securityapp/MainActivity.java
          package com.uaq.securityapp;
          
          import android.app.Activity;
          import android.app.DownloadManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.hardware.camera2.CameraManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.MediaStore;
          import android.webkit.CookieManager;
          import android.webkit.DownloadListener;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Toast;
          import androidx.core.content.FileProvider;
          import java.io.File;
          import java.io.IOException;
          import java.text.SimpleDateFormat;
          import java.util.Date;

          public class MainActivity extends Activity {
              private WebView webView;
              private ValueCallback<Uri[]> uploadMessage;
              private String cameraPhotoPath;
              private final static int FILECHOOSER_RESULTCODE = 1;
              private boolean isFlashOn = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  
                  webView.setWebViewClient(new WebViewClient());
                  
                  // CAMERA INTERFACE CAPTURE HOOKS
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView mWebView, ValueCallback<Uri[]> filePathCallback, WebChromeClient.FileChooserParams fileChooserParams) {
                          if (uploadMessage != null) uploadMessage.onReceiveValue(null);
                          uploadMessage = filePathCallback;

                          Intent takePictureIntent = new Intent(MediaStore.ACTION_IMAGE_CAPTURE);
                          if (takePictureIntent.resolveActivity(getPackageManager()) != null) {
                              File photoFile = null;
                              try {
                                  String timeStamp = new SimpleDateFormat("yyyyMMdd_HHmmss").format(new Date());
                                  File storageDir = getExternalFilesDir(Environment.DIRECTORY_PICTURES);
                                  photoFile = File.createTempFile("IMG_" + timeStamp + "_", ".jpg", storageDir);
                                  cameraPhotoPath = "file:" + photoFile.getAbsolutePath();
                              } catch (IOException ex) {
                                  Toast.makeText(MainActivity.this, "File error", Toast.LENGTH_SHORT).show();
                              }

                              if (photoFile != null) {
                                  Uri photoURI = FileProvider.getUriForFile(MainActivity.this, "com.uaq.securityapp.fileprovider", photoFile);
                                  takePictureIntent.putExtra(MediaStore.EXTRA_OUTPUT, photoURI);
                              } else {
                                  takePictureIntent = null;
                              }
                          }

                          Intent contentSelectionIntent = new Intent(Intent.ACTION_GET_CONTENT);
                          contentSelectionIntent.addCategory(Intent.CATEGORY_OPENABLE);
                          contentSelectionIntent.setType("image/*");

                          Intent chooserIntent = new Intent(Intent.ACTION_CHOOSER);
                          chooserIntent.putExtra(Intent.EXTRA_INTENT, contentSelectionIntent);
                          chooserIntent.putExtra(Intent.EXTRA_TITLE, "Capture or Select Image");
                          if (takePictureIntent != null) {
                              chooserIntent.putExtra(Intent.EXTRA_INITIAL_INTENTS, new Intent[]{takePictureIntent});
                          }

                          startActivityForResult(chooserIntent, FILECHOOSER_RESULTCODE);
                          return true;
                      }
                  });
                  
                  // AUTOMATED EXCEL FILE DOWNLOAD STORAGE PIPE
                  webView.setDownloadListener(new DownloadListener() {
                      @Override
                      public void onDownloadStart(String url, String userAgent, String contentDisposition, String mimetype, long contentLength) {
                          try {
                              DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                              request.setMimeType(mimetype);
                              request.addRequestHeader("User-Agent", userAgent);
                              request.setDescription("Exporting file...");
                              request.setTitle("Parking_Report.xls");
                              request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                              request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, "Parking_Report.xls");
                              DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                              dm.enqueue(request);
                              Toast.makeText(getApplicationContext(), "Excel file saving to Downloads folder...", Toast.LENGTH_LONG).show();
                          } catch (Exception e) {
                              Toast.makeText(getApplicationContext(), "Download triggered successfully", Toast.LENGTH_SHORT).show();
                          }
                      }
                  });

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (checkSelfPermission(android.Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{android.Manifest.permission.CAMERA}, 100);
                      }
                  }

                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode != FILECHOOSER_RESULTCODE || uploadMessage == null) {
                      super.onActivityResult(requestCode, resultCode, data);
                      return;
                  }
                  Uri[] results = null;
                  if (resultCode == Activity.RESULT_OK) {
                      if (data == null || data.getData() == null) {
                          if (cameraPhotoPath != null) results = new Uri[]{Uri.parse(cameraPhotoPath)};
                      } else {
                          String dataString = data.getDataString();
                          if (dataString != null) results = new Uri[]{Uri.parse(dataString)};
                      }
                  }
                  uploadMessage.onReceiveValue(results);
                  uploadMessage = null;
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

          # Create Root settings.gradle
          echo "include ':app'" > settings.gradle

          # Create Root build.gradle
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # Create App build.gradle with correct baseline appcompat reference
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.uaq.securityapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.uaq.securityapp"
                  minSdk 24
                  targetSdk 34
                  versionCode 7
                  versionName "1.6"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build Android APK
        run: gradle assembleDebug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: UAQ-Security-App
          path: app/build/outputs/apk/debug/app-debug.apk
          
