name: Build Mobile Offline APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Initialize Capacitor Project
        run: |
          mkdir -p www
          cp index.html www/
          npx cap init "UAQ Security" "com.uaq.securityapp" --web-dir=www

      - name: Add Android Platform
        run: npx cap add android

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Copy APK to Output Folder
        run: |
          mkdir -p final-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk final-apk/UAQ-Security.apk

      - name: Upload APK File Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UAQ-Security-App
          path: final-apk/
          
